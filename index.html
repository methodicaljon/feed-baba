<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f7f8fb">
  <title>Feed Baba</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --accent: #1d4ed8;
      --accent-pressed: #1e40af;
      --ring: rgba(29, 78, 216, 0.22);
      --safe: #16a34a;
      --safe-bg: #dcfce7;
      --warn: #facc15;
      --warn-bg: #fef9c3;
      --danger: #dc2626;
      --danger-bg: #fee2e2;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }

    .app {
      width: min(520px, 100%);
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 22px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 1.9rem;
      line-height: 1.2;
      text-align: center;
    }

    .feed-button {
      width: 100%;
      border: none;
      border-radius: var(--radius);
      padding: 22px 16px;
      font-size: 1.45rem;
      font-weight: 700;
      color: #ffffff;
      background: var(--accent);
      box-shadow: 0 8px 20px var(--ring);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .feed-button:active {
      transform: translateY(1px);
      background: var(--accent-pressed);
    }

    .feed-button:focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
    }

    .status {
      margin-top: 16px;
      display: grid;
      gap: 10px;
      font-size: 1rem;
      line-height: 1.45;
    }

    .countdown {
      display: grid;
      gap: 8px;
      border: 2px solid #dbeafe;
      border-radius: var(--radius);
      background: #eff6ff;
      min-height: 230px;
      place-items: center;
      padding: 24px 14px;
      text-align: center;
      color: var(--accent);
    }

    .countdown.safe {
      border-color: var(--safe);
      background: var(--safe-bg);
      color: var(--safe);
    }

    .countdown.warning {
      border-color: var(--warn);
      background: var(--warn-bg);
      color: #854d0e;
    }

    .countdown.overdue {
      border-color: var(--danger);
      background: var(--danger-bg);
      color: var(--danger);
    }

    .countdown-label {
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .countdown-time {
      font-size: 5.3rem;
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .countdown.overdue .countdown-time {
      font-weight: 900;
    }

    .line {
      background: #f8fafc;
      border-radius: var(--radius);
      padding: 12px 13px;
      color: var(--muted);
    }

    .label {
      color: var(--text);
      font-weight: 600;
    }

    .version {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
    }

    @media (max-width: 380px) {
      .app {
        padding: 18px;
      }

      h1 {
        font-size: 1.65rem;
      }

      .feed-button {
        font-size: 1.3rem;
        padding: 19px 14px;
      }

      .countdown-time {
        font-size: 4rem;
      }

      .countdown.overdue .countdown-time {
        font-size: 3.4rem;
      }
    }

    @media (min-width: 700px) {
      .countdown-time {
        font-size: 6.4rem;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --card: #0b0b0b;
        --text: #f3f4f6;
        --muted: #c7ccd4;
        --accent: #60a5fa;
        --accent-pressed: #3b82f6;
        --ring: rgba(96, 165, 250, 0.28);
        --safe: #4ade80;
        --safe-bg: #052e16;
        --warn: #facc15;
        --warn-bg: #422006;
        --danger: #f87171;
        --danger-bg: #450a0a;
      }

      .app {
        box-shadow: none;
      }

      .countdown {
        border-color: #1e3a8a;
        background: #0b1220;
      }

      .line {
        background: #151515;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Feed Baba</h1>
    <button id="fedButton" class="feed-button" type="button">Fed Baba</button>

    <section class="status" aria-live="polite">
      <div id="countdownBox" class="countdown">
        <div class="countdown-label">Time until next feed</div>
        <div id="dueText" class="countdown-time">--</div>
      </div>
      <div class="line"><span class="label">Last fed:</span> <span id="lastFedText">Not yet</span></div>
      <div class="line"><span class="label">Time since feed:</span> <span id="sinceText">Press the button after feeding</span></div>
    </section>
    <p class="version">v1.1</p>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    // Replace with your project values from Supabase > Settings > API
    var SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
    var SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

    // Keep one shared row in table: feed_state (id int primary key, last_fed timestamptz)
    var STATE_ROW_ID = 1;
    var THREE_HOURS_MS = 3 * 60 * 60 * 1000;
    var STORAGE_KEY = "feed-baba-last-fed";
    var hasSupabaseConfig =
      !SUPABASE_URL.includes("YOUR_PROJECT_ID") &&
      SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY";
    var supabase = hasSupabaseConfig ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    var lastFedText = document.getElementById("lastFedText");
    var sinceText = document.getElementById("sinceText");
    var dueText = document.getElementById("dueText");
    var countdownBox = document.getElementById("countdownBox");
    var fedButton = document.getElementById("fedButton");

    var lastFedDate = null;
    var overdueVibrated = false;

    function formatDate(date) {
      return date.toLocaleString([], {
        weekday: "short",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatDuration(ms) {
      var totalSeconds = Math.max(0, Math.floor(ms / 1000));
      var hours = Math.floor(totalSeconds / 3600);
      var minutes = Math.floor((totalSeconds % 3600) / 60);
      var seconds = totalSeconds % 60;

      if (hours > 0) return hours + "h " + minutes + "m " + seconds + "s";
      if (minutes > 0) return minutes + "m " + seconds + "s";
      return seconds + "s";
    }

    function setCountdownState(state) {
      countdownBox.classList.remove("safe", "warning", "overdue");
      if (state) countdownBox.classList.add(state);
    }

    function vibrateOverdueOnce() {
      if (overdueVibrated) return;
      overdueVibrated = true;

      if ("vibrate" in navigator) {
        navigator.vibrate([80, 50, 80]);
      }
    }

    function setLastFedFromIso(isoValue) {
      if (!isoValue) {
        lastFedDate = null;
        return;
      }

      var next = new Date(isoValue);
      lastFedDate = isNaN(next.getTime()) ? null : next;
    }

    function loadLocalLastFed() {
      setLastFedFromIso(localStorage.getItem(STORAGE_KEY));
      render();
    }

    function saveLocalLastFed(isoValue) {
      localStorage.setItem(STORAGE_KEY, isoValue);
      setLastFedFromIso(isoValue);
      render();
    }

    function render() {
      if (!lastFedDate) {
        lastFedText.textContent = "Not yet";
        sinceText.textContent = "Press the button after feeding";
        dueText.textContent = "--";
        setCountdownState("");
        overdueVibrated = false;
        return;
      }

      lastFedText.textContent = formatDate(lastFedDate);
      sinceText.textContent = formatDuration(Date.now() - lastFedDate.getTime());
      var dueAt = new Date(lastFedDate.getTime() + THREE_HOURS_MS);
      var remainingMs = dueAt.getTime() - Date.now();

      if (remainingMs > 0) {
        dueText.textContent = formatDuration(remainingMs);
        overdueVibrated = false;
        if (remainingMs > 60 * 60 * 1000) {
          setCountdownState("safe");
        } else if (remainingMs < 30 * 60 * 1000) {
          setCountdownState("warning");
        } else {
          setCountdownState("");
        }
      } else {
        dueText.textContent = "FEED NOW";
        setCountdownState("overdue");
        vibrateOverdueOnce();
      }
    }

    async function loadLastFed() {
      if (!supabase) {
        loadLocalLastFed();
        return;
      }

      var result = await supabase
        .from("feed_state")
        .select("last_fed")
        .eq("id", STATE_ROW_ID)
        .maybeSingle();

      if (result.error) {
        lastFedText.textContent = "Connection issue";
        sinceText.textContent = "Check Supabase settings";
        dueText.textContent = "--";
        setCountdownState("");
        return;
      }

      setLastFedFromIso(result.data && result.data.last_fed);

      render();
    }

    async function saveNow() {
      fedButton.disabled = true;
      fedButton.textContent = "Saving...";

      var nowIso = new Date().toISOString();

      if (!supabase) {
        saveLocalLastFed(nowIso);
        fedButton.disabled = false;
        fedButton.textContent = "Fed Baba";
        return;
      }

      var result = await supabase
        .from("feed_state")
        .upsert({ id: STATE_ROW_ID, last_fed: nowIso }, { onConflict: "id" });

      fedButton.disabled = false;
      fedButton.textContent = "Fed Baba";

      if (result.error) {
        lastFedText.textContent = "Save failed";
        sinceText.textContent = result.error.message || "Please try again";
        return;
      }

      lastFedDate = new Date(nowIso);
      render();
    }

    function subscribeToRealtime() {
      if (!supabase) return;

      supabase
        .channel("feed-state-live")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "feed_state", filter: "id=eq." + STATE_ROW_ID },
          function (payload) {
            var row = payload.new || payload.old;
            if (row && row.last_fed) {
              var next = new Date(row.last_fed);
              if (!isNaN(next.getTime())) {
                lastFedDate = next;
                render();
                return;
              }
            }
            loadLastFed();
          }
        )
        .subscribe();
    }

    fedButton.addEventListener("click", saveNow);
    await loadLastFed();
    subscribeToRealtime();
    setInterval(render, 1000);
    setInterval(loadLastFed, 60000);
  </script>
</body>
</html>
