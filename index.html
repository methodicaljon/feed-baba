<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <title>Feed Baby</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #6b7280;
      --subtle: #e9eef5;
      --blue-1: #dbeafe;
      --blue-2: #60a5fa;
      --blue-3: #0a84ff;
      --accent: #0a84ff;
      --accent-pressed: #0066cc;
      --button: #111111;
      --button-text: #ffffff;
      --button-pressed: #2a2a2a;
      --safe: #16803c;
      --warn: #b77900;
      --danger: #d92d20;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
    }

    .app {
      width: min(430px, 100%);
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      gap: 28px;
      min-height: min(760px, calc(100vh - 36px));
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .version {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
    }

    .timer {
      display: grid;
      gap: 13px;
      padding: 24px 0 8px;
      text-align: center;
      color: var(--safe);
      transition: color 180ms ease;
    }

    .timer.warning {
      color: var(--warn);
    }

    .timer.overdue {
      color: var(--danger);
    }

    .timer-value {
      font-size: 6.5rem;
      font-weight: 900;
      line-height: 0.88;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      font-variant-numeric: tabular-nums;
      transition: color 180ms ease, transform 180ms ease;
    }

    .timer-value.updating {
      animation: timer-update 180ms ease;
    }

    .timer.overdue .timer-value {
      font-size: 4.6rem;
    }

    .timer-label {
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .info {
      display: grid;
      gap: 13px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    .info-row span:first-child {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
    }

    .info-row strong {
      color: var(--text);
      font-weight: 700;
      text-align: right;
      min-width: 8ch;
    }

    .activity {
      display: grid;
      gap: 11px;
    }

    .activity-title {
      display: grid;
      gap: 2px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      text-align: center;
      text-transform: uppercase;
    }

    .activity-title span:last-child {
      font-size: 0.68rem;
      font-weight: 700;
    }

    .activity-grid {
      display: grid;
      grid-template-columns: repeat(24, minmax(0, 1fr));
      gap: 4px;
    }

    .hour-cell {
      aspect-ratio: 1;
      border-radius: 5px;
      background: var(--subtle);
      transition: background-color 180ms ease, transform 180ms ease;
    }

    .hour-cell.level-1 {
      background: var(--blue-1);
    }

    .hour-cell.level-2 {
      background: var(--blue-2);
    }

    .hour-cell.level-3 {
      background: var(--blue-3);
    }

    .actions {
      align-self: end;
      display: grid;
      gap: 12px;
    }

    .feed-button {
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      padding: 21px 16px;
      color: var(--button-text);
      background: var(--button);
      font: inherit;
      font-size: 1.35rem;
      font-weight: 850;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 180ms ease, color 180ms ease, opacity 180ms ease, transform 120ms ease;
    }

    .feed-button:active {
      transform: translateY(1px);
      background: var(--button-pressed);
    }

    .feed-button:focus-visible,
    .confirm-actions button:focus-visible {
      outline: 3px solid rgba(10, 132, 255, 0.3);
      outline-offset: 2px;
    }

    .feed-button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
      transform: none;
    }

    .notice {
      min-height: 1.2em;
      margin: 0;
      color: var(--safe);
      font-size: 0.9rem;
      font-weight: 800;
      text-align: center;
    }

    .notice:empty {
      min-height: 0;
    }

    .confirm {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.28);
    }

    .confirm[hidden] {
      display: none;
    }

    .confirm-box {
      width: min(330px, 100%);
      border-radius: var(--radius);
      background: var(--bg);
      padding: 18px;
      text-align: center;
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.18);
    }

    .confirm-box p {
      margin: 0 0 16px;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 850;
    }

    .confirm-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .confirm-actions button {
      border: 0;
      border-radius: var(--radius);
      padding: 14px 12px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .confirm-yes {
      color: #ffffff;
      background: var(--accent);
    }

    .confirm-cancel {
      color: var(--text);
      background: var(--subtle);
    }

    @keyframes timer-update {
      from {
        opacity: 0.78;
        transform: translateY(2px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 390px) {
      .app {
        gap: 23px;
        min-height: calc(100vh - 36px);
      }

      .timer-value {
        font-size: 5.2rem;
      }

      .timer.overdue .timer-value {
        font-size: 3.45rem;
      }

      .feed-button {
        font-size: 1.24rem;
      }
    }

    @media (min-width: 700px) {
      .timer-value {
        font-size: 7.25rem;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --text: #f5f5f7;
        --muted: #a8adb7;
      --subtle: #1d1f24;
      --blue-1: #17304f;
      --blue-2: #2f81f7;
      --blue-3: #58a6ff;
      --accent: #58a6ff;
      --accent-pressed: #2f81f7;
      --button: #f5f5f7;
      --button-text: #000000;
      --button-pressed: #d8dce3;
        --safe: #63d471;
        --warn: #ffd45a;
        --danger: #ff6b5f;
      }

      .confirm {
        background: rgba(0, 0, 0, 0.72);
      }

      .confirm-box {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="brand">
      <h1>Feed Baby</h1>
      <span class="version">v4</span>
    </header>

    <section id="timer" class="timer" aria-live="polite">
      <div id="timerValue" class="timer-value">--</div>
      <div class="timer-label">Next feed</div>
    </section>

    <section class="info" aria-label="Feed details">
      <div class="info-row">
        <span>Last fed</span>
        <strong id="lastFedText">Not yet</strong>
      </div>
      <div class="info-row">
        <span>Time since</span>
        <strong id="sinceText">--</strong>
      </div>
      <div class="info-row">
        <span>Next feed</span>
        <strong id="nextFeedText">--</strong>
      </div>
    </section>

    <section class="activity" aria-label="Today feed activity">
      <div class="activity-title">
        <span>Today</span>
        <span>24 hours</span>
      </div>
      <div id="activityGrid" class="activity-grid"></div>
    </section>

    <section class="actions">
      <button id="fedButton" class="feed-button" type="button">Just Fed</button>
      <p id="noticeText" class="notice" aria-live="polite"></p>
    </section>
  </main>

  <div id="confirmPrompt" class="confirm" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" hidden>
    <div class="confirm-box">
      <p id="confirmTitle">Start next 2 hour timer?</p>
      <div class="confirm-actions">
        <button id="confirmYes" class="confirm-yes" type="button">Yes</button>
        <button id="confirmCancel" class="confirm-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    var FEED_INTERVAL_MS = 2 * 60 * 60 * 1000;
    var FEED_LOG_KEY = "feed-baby-feed-log";
    var LEGACY_LOG_KEY = "feed-baba-feed-log";
    var LEGACY_LAST_FED_KEY = "feed-baba-last-fed";
    var MAX_LOG_ENTRIES = 120;

    var timer = document.getElementById("timer");
    var timerValue = document.getElementById("timerValue");
    var lastFedText = document.getElementById("lastFedText");
    var sinceText = document.getElementById("sinceText");
    var nextFeedText = document.getElementById("nextFeedText");
    var activityGrid = document.getElementById("activityGrid");
    var fedButton = document.getElementById("fedButton");
    var noticeText = document.getElementById("noticeText");
    var confirmPrompt = document.getElementById("confirmPrompt");
    var confirmYes = document.getElementById("confirmYes");
    var confirmCancel = document.getElementById("confirmCancel");

    var noticeTimer = null;
    var isSaving = false;

    function readJsonList(key) {
      try {
        var parsed = JSON.parse(localStorage.getItem(key) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function normalizeFeeds(entries) {
      var seen = {};

      return entries
        .filter(function (entry) {
          var date = new Date(entry);
          return !isNaN(date.getTime());
        })
        .map(function (entry) {
          return new Date(entry).toISOString();
        })
        .filter(function (entry) {
          if (seen[entry]) return false;
          seen[entry] = true;
          return true;
        })
        .sort(function (a, b) {
          return new Date(b).getTime() - new Date(a).getTime();
        })
        .slice(0, MAX_LOG_ENTRIES);
    }

    function migrateLegacyFeeds() {
      if (localStorage.getItem(FEED_LOG_KEY)) return;

      var legacyEntries = readJsonList(LEGACY_LOG_KEY);
      var legacyLastFed = localStorage.getItem(LEGACY_LAST_FED_KEY);
      if (legacyLastFed) legacyEntries.unshift(legacyLastFed);

      var migrated = normalizeFeeds(legacyEntries);
      if (migrated.length > 0) {
        localStorage.setItem(FEED_LOG_KEY, JSON.stringify(migrated));
      }
    }

    function getFeeds() {
      return normalizeFeeds(readJsonList(FEED_LOG_KEY));
    }

    function saveFeeds(entries) {
      localStorage.setItem(FEED_LOG_KEY, JSON.stringify(normalizeFeeds(entries)));
    }

    function getLastFeedDate() {
      var feeds = getFeeds();
      if (feeds.length === 0) return null;

      var date = new Date(feeds[0]);
      return isNaN(date.getTime()) ? null : date;
    }

    function formatClock(date) {
      return date.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatDuration(ms) {
      var totalSeconds = Math.max(0, Math.floor(ms / 1000));
      var hours = Math.floor(totalSeconds / 3600);
      var minutes = Math.floor((totalSeconds % 3600) / 60);
      var seconds = totalSeconds % 60;

      if (hours > 0) return hours + "h " + minutes + "m";
      if (minutes > 0) return minutes + "m " + seconds + "s";
      return seconds + "s";
    }

    function formatTimer(ms) {
      if (ms < 60000) {
        return Math.max(0, Math.ceil(ms / 1000)) + "s";
      }

      var totalSeconds = Math.max(0, Math.ceil(ms / 1000));
      var totalMinutes = Math.ceil(totalSeconds / 60);

      if (totalMinutes >= 100) {
        return totalMinutes + "m";
      }

      var minutes = Math.floor(totalSeconds / 60);
      var seconds = totalSeconds % 60;

      if (seconds === 0) {
        return minutes + ":00";
      }

      return minutes + ":" + String(seconds).padStart(2, "0");
    }

    function setTimerState(state) {
      timer.classList.remove("safe", "warning", "overdue");
      if (state) timer.classList.add(state);
    }

    function setTimerValue(nextValue) {
      if (timerValue.textContent === nextValue) return;

      timerValue.textContent = nextValue;
      timerValue.classList.remove("updating");
      void timerValue.offsetWidth;
      timerValue.classList.add("updating");
    }

    function renderTimer() {
      var lastFeedDate = getLastFeedDate();

      if (!lastFeedDate) {
        setTimerValue("--");
        lastFedText.textContent = "Not yet";
        sinceText.textContent = "--";
        nextFeedText.textContent = "--";
        setTimerState("");
        return;
      }

      var now = Date.now();
      var dueAt = new Date(lastFeedDate.getTime() + FEED_INTERVAL_MS);
      var remainingMs = dueAt.getTime() - now;

      lastFedText.textContent = formatClock(lastFeedDate);
      sinceText.textContent = formatDuration(now - lastFeedDate.getTime());
      nextFeedText.textContent = formatClock(dueAt);

      if (remainingMs <= 0) {
        setTimerValue("FEED NOW");
        setTimerState("overdue");
      } else {
        setTimerValue(formatTimer(remainingMs));
        setTimerState(remainingMs < 30 * 60 * 1000 ? "warning" : "safe");
      }
    }

    function getFeedsByHour() {
      var now = new Date();
      var startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      var feedsByHour = {};

      getFeeds().forEach(function (entry) {
        var date = new Date(entry);
        if (date < startOfDay || date > now) return;

        var hour = date.getHours();
        if (!feedsByHour[hour] || date > feedsByHour[hour]) {
          feedsByHour[hour] = date;
        }
      });

      return feedsByHour;
    }

    function getActivityLevel(feedDate) {
      if (!feedDate) return 0;

      var ageHours = (Date.now() - feedDate.getTime()) / 3600000;
      if (ageHours <= 2) return 3;
      if (ageHours <= 8) return 2;
      return 1;
    }

    function renderActivityGrid() {
      var feedsByHour = getFeedsByHour();
      activityGrid.innerHTML = "";

      for (var hour = 0; hour < 24; hour += 1) {
        var cell = document.createElement("div");
        var feedDate = feedsByHour[hour];
        var level = getActivityLevel(feedDate);
        cell.className = "hour-cell" + (level ? " level-" + level : "");
        cell.title = feedDate ? "Fed at " + formatClock(feedDate) : "No feed logged at " + hour + ":00";
        activityGrid.appendChild(cell);
      }
    }

    function render() {
      renderTimer();
      renderActivityGrid();
    }

    function showNotice(message) {
      noticeText.textContent = message;
      clearTimeout(noticeTimer);
      noticeTimer = setTimeout(function () {
        noticeText.textContent = "";
      }, 2200);
    }

    function showConfirm() {
      if (fedButton.disabled || isSaving) return;
      confirmPrompt.hidden = false;
      fedButton.disabled = true;
      confirmYes.focus();
    }

    function hideConfirm() {
      confirmPrompt.hidden = true;
      fedButton.disabled = false;
      fedButton.textContent = "Just Fed";
    }

    function finishButtonCooldown(startedAt) {
      var elapsed = Date.now() - startedAt;
      var remaining = Math.max(0, 3000 - elapsed);

      setTimeout(function () {
        isSaving = false;
        fedButton.disabled = false;
        fedButton.textContent = "Just Fed";
      }, remaining);
    }

    function logFeed() {
      if (isSaving) return;

      isSaving = true;
      var startedAt = Date.now();
      var nowIso = new Date().toISOString();
      var feeds = getFeeds();

      confirmPrompt.hidden = true;
      fedButton.disabled = true;
      fedButton.textContent = "Saved";
      saveFeeds([nowIso].concat(feeds));
      showNotice("Saved \u2713");
      render();
      finishButtonCooldown(startedAt);
    }

    fedButton.addEventListener("click", showConfirm);
    confirmYes.addEventListener("click", logFeed);
    confirmCancel.addEventListener("click", hideConfirm);
    confirmPrompt.addEventListener("click", function (event) {
      if (event.target === confirmPrompt) hideConfirm();
    });
    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && !confirmPrompt.hidden) hideConfirm();
    });

    migrateLegacyFeeds();
    render();
    setInterval(renderTimer, 1000);
    setInterval(renderActivityGrid, 60000);
  </script>
</body>
</html>
