<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f6f7f9">
  <title>Feed Baby</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-soft: #f1f5f9;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #0a84ff;
      --accent-pressed: #0066cc;
      --safe: #0a7f3f;
      --safe-bg: #e7f8ee;
      --warn: #9a6a00;
      --warn-bg: #fff4bf;
      --danger: #d92d20;
      --danger-bg: #ffe8e5;
      --shadow: 0 18px 44px rgba(15, 23, 42, 0.1);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    }

    .app {
      width: min(560px, 100%);
      display: grid;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.2;
    }

    .version {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .countdown {
      display: grid;
      gap: 12px;
      min-height: 250px;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-soft);
      padding: 24px 12px;
      text-align: center;
      color: var(--accent);
    }

    .countdown.safe {
      color: var(--safe);
      background: var(--safe-bg);
      border-color: rgba(10, 127, 63, 0.2);
    }

    .countdown.warning {
      color: var(--warn);
      background: var(--warn-bg);
      border-color: rgba(154, 106, 0, 0.25);
    }

    .countdown.overdue {
      color: var(--danger);
      background: var(--danger-bg);
      border-color: rgba(217, 45, 32, 0.24);
    }

    .countdown-label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .countdown-time {
      font-size: 5.4rem;
      font-weight: 850;
      line-height: 0.9;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .countdown.overdue .countdown-time {
      font-size: 4.2rem;
      font-weight: 900;
    }

    .meta {
      color: var(--muted);
      font-size: 0.98rem;
    }

    .panel {
      display: grid;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 12px;
    }

    .panel-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 800;
    }

    .panel-note {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .activity-grid {
      display: grid;
      grid-template-columns: repeat(24, minmax(0, 1fr));
      gap: 4px;
    }

    .hour-cell {
      aspect-ratio: 1;
      border: 0;
      border-radius: 4px;
      background: #e5e7eb;
      padding: 0;
    }

    .hour-cell.level-1 {
      background: #bfdbfe;
    }

    .hour-cell.level-2 {
      background: #60a5fa;
    }

    .hour-cell.level-3 {
      background: #1d4ed8;
    }

    .hour-labels {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      color: var(--muted);
      font-size: 0.74rem;
    }

    .hour-labels span:nth-child(2),
    .hour-labels span:nth-child(3) {
      text-align: center;
    }

    .hour-labels span:last-child {
      text-align: right;
    }

    .bottom {
      display: grid;
      gap: 12px;
    }

    .feed-button {
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      padding: 21px 16px;
      color: #ffffff;
      background: var(--accent);
      box-shadow: 0 10px 24px rgba(10, 132, 255, 0.24);
      font: inherit;
      font-size: 1.45rem;
      font-weight: 850;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .feed-button:active {
      transform: translateY(1px);
      background: var(--accent-pressed);
    }

    .feed-button:focus-visible,
    .confirm-actions button:focus-visible {
      outline: 3px solid rgba(10, 132, 255, 0.28);
      outline-offset: 2px;
    }

    .feed-button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
      transform: none;
    }

    .notice {
      min-height: 1.25em;
      margin: 0;
      color: var(--safe);
      font-weight: 800;
      text-align: center;
    }

    .notice:empty {
      min-height: 0;
    }

    .feed-log {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .feed-log li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .feed-log strong {
      color: var(--text);
      font-weight: 750;
    }

    .confirm {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(17, 24, 39, 0.36);
    }

    .confirm[hidden] {
      display: none;
    }

    .confirm-box {
      width: min(340px, 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 18px;
      text-align: center;
    }

    .confirm-box p {
      margin: 0 0 16px;
      font-size: 1.15rem;
      font-weight: 850;
    }

    .confirm-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .confirm-actions button {
      border: 0;
      border-radius: var(--radius);
      padding: 14px 12px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .confirm-yes {
      color: #ffffff;
      background: var(--accent);
    }

    .confirm-cancel {
      color: var(--text);
      background: var(--surface-soft);
    }

    @media (max-width: 390px) {
      .app {
        padding: 14px;
      }

      .countdown {
        min-height: 225px;
      }

      .countdown-time {
        font-size: 4.4rem;
      }

      .countdown.overdue .countdown-time {
        font-size: 3.3rem;
      }

      .activity-grid {
        gap: 3px;
      }

      .feed-button {
        font-size: 1.32rem;
      }
    }

    @media (min-width: 700px) {
      .countdown-time {
        font-size: 6.6rem;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --surface: #101113;
        --surface-soft: #17191c;
        --text: #f5f5f7;
        --muted: #a9aeb8;
        --border: #272a30;
        --accent: #58a6ff;
        --accent-pressed: #2f81f7;
        --safe: #63d471;
        --safe-bg: #0f2416;
        --warn: #ffd45a;
        --warn-bg: #2b2207;
        --danger: #ff6b5f;
        --danger-bg: #2a0c0a;
        --shadow: none;
      }

      .hour-cell {
        background: #24272d;
      }

      .hour-cell.level-1 {
        background: #1e3a5f;
      }

      .hour-cell.level-2 {
        background: #2563eb;
      }

      .hour-cell.level-3 {
        background: #60a5fa;
      }

      .confirm {
        background: rgba(0, 0, 0, 0.7);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>Feed Baby</h1>
      <span class="version">v3</span>
    </header>

    <section id="countdownBox" class="countdown" aria-live="polite">
      <div>
        <div class="countdown-label">Time until next feed</div>
        <div id="dueText" class="countdown-time">--</div>
      </div>
      <div id="timerMeta" class="meta">Tap Fed Baby after feeding</div>
    </section>

    <section class="panel" aria-label="Daily feed activity">
      <div class="panel-title">
        <span>Today</span>
        <span class="panel-note">24 hours</span>
      </div>
      <div id="activityGrid" class="activity-grid"></div>
      <div class="hour-labels" aria-hidden="true">
        <span>12a</span>
        <span>6a</span>
        <span>12p</span>
        <span>11p</span>
      </div>
    </section>

    <section class="bottom">
      <button id="fedButton" class="feed-button" type="button">Fed Baby</button>
      <p id="noticeText" class="notice" aria-live="polite"></p>

      <div class="panel">
        <div class="panel-title">
          <span>Last 3 feeds</span>
        </div>
        <ul id="feedLog" class="feed-log"></ul>
      </div>
    </section>
  </main>

  <div id="confirmPrompt" class="confirm" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" hidden>
    <div class="confirm-box">
      <p id="confirmTitle">Start next 2 hour timer?</p>
      <div class="confirm-actions">
        <button id="confirmYes" class="confirm-yes" type="button">Yes</button>
        <button id="confirmCancel" class="confirm-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    var FEED_INTERVAL_MS = 2 * 60 * 60 * 1000;
    var FEED_LOG_KEY = "feed-baby-feed-log";
    var LEGACY_LOG_KEY = "feed-baba-feed-log";
    var LEGACY_LAST_FED_KEY = "feed-baba-last-fed";
    var MAX_LOG_ENTRIES = 120;

    var countdownBox = document.getElementById("countdownBox");
    var dueText = document.getElementById("dueText");
    var timerMeta = document.getElementById("timerMeta");
    var activityGrid = document.getElementById("activityGrid");
    var fedButton = document.getElementById("fedButton");
    var noticeText = document.getElementById("noticeText");
    var feedLog = document.getElementById("feedLog");
    var confirmPrompt = document.getElementById("confirmPrompt");
    var confirmYes = document.getElementById("confirmYes");
    var confirmCancel = document.getElementById("confirmCancel");

    var noticeTimer = null;
    var overdueVibrated = false;
    var isSaving = false;

    function readJsonList(key) {
      try {
        var parsed = JSON.parse(localStorage.getItem(key) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function normalizeFeeds(entries) {
      var seen = {};

      return entries
        .filter(function (entry) {
          var date = new Date(entry);
          return !isNaN(date.getTime());
        })
        .map(function (entry) {
          return new Date(entry).toISOString();
        })
        .filter(function (entry) {
          if (seen[entry]) return false;
          seen[entry] = true;
          return true;
        })
        .sort(function (a, b) {
          return new Date(b).getTime() - new Date(a).getTime();
        })
        .slice(0, MAX_LOG_ENTRIES);
    }

    function migrateLegacyFeeds() {
      if (localStorage.getItem(FEED_LOG_KEY)) return;

      var legacyEntries = readJsonList(LEGACY_LOG_KEY);
      var legacyLastFed = localStorage.getItem(LEGACY_LAST_FED_KEY);
      if (legacyLastFed) legacyEntries.unshift(legacyLastFed);

      var migrated = normalizeFeeds(legacyEntries);
      if (migrated.length > 0) {
        localStorage.setItem(FEED_LOG_KEY, JSON.stringify(migrated));
      }
    }

    function getFeeds() {
      return normalizeFeeds(readJsonList(FEED_LOG_KEY));
    }

    function saveFeeds(entries) {
      localStorage.setItem(FEED_LOG_KEY, JSON.stringify(normalizeFeeds(entries)));
    }

    function getLastFeedDate() {
      var feeds = getFeeds();
      if (feeds.length === 0) return null;

      var date = new Date(feeds[0]);
      return isNaN(date.getTime()) ? null : date;
    }

    function formatTime(date) {
      return date.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatDateTime(date) {
      return date.toLocaleString([], {
        weekday: "short",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatDuration(ms) {
      var totalSeconds = Math.max(0, Math.floor(ms / 1000));
      var hours = Math.floor(totalSeconds / 3600);
      var minutes = Math.floor((totalSeconds % 3600) / 60);
      var seconds = totalSeconds % 60;

      if (hours > 0) return hours + "h " + minutes + "m";
      if (minutes > 0) return minutes + "m " + seconds + "s";
      return seconds + "s";
    }

    function setCountdownState(state) {
      countdownBox.classList.remove("safe", "warning", "overdue");
      if (state) countdownBox.classList.add(state);
    }

    function vibrateOverdueOnce() {
      if (overdueVibrated) return;
      overdueVibrated = true;

      if ("vibrate" in navigator) {
        navigator.vibrate([80, 50, 80]);
      }
    }

    function renderCountdown() {
      var lastFeedDate = getLastFeedDate();

      if (!lastFeedDate) {
        dueText.textContent = "--";
        timerMeta.textContent = "Tap Fed Baby after feeding";
        setCountdownState("");
        overdueVibrated = false;
        return;
      }

      var dueAt = new Date(lastFeedDate.getTime() + FEED_INTERVAL_MS);
      var remainingMs = dueAt.getTime() - Date.now();

      if (remainingMs > 0) {
        dueText.textContent = formatDuration(remainingMs);
        timerMeta.textContent = "Last fed " + formatTime(lastFeedDate);
        overdueVibrated = false;

        if (remainingMs > 60 * 60 * 1000) {
          setCountdownState("safe");
        } else if (remainingMs < 30 * 60 * 1000) {
          setCountdownState("warning");
        } else {
          setCountdownState("");
        }
      } else {
        dueText.textContent = "FEED NOW";
        timerMeta.textContent = "Due since " + formatTime(dueAt);
        setCountdownState("overdue");
        vibrateOverdueOnce();
      }
    }

    function getFeedsByHour() {
      var now = new Date();
      var startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      var feedsByHour = {};

      getFeeds().forEach(function (entry) {
        var date = new Date(entry);
        if (date < startOfDay || date > now) return;

        var hour = date.getHours();
        if (!feedsByHour[hour] || date > feedsByHour[hour]) {
          feedsByHour[hour] = date;
        }
      });

      return feedsByHour;
    }

    function getActivityLevel(feedDate) {
      if (!feedDate) return 0;

      var ageHours = (Date.now() - feedDate.getTime()) / 3600000;
      if (ageHours <= 2) return 3;
      if (ageHours <= 8) return 2;
      return 1;
    }

    function renderActivityGrid() {
      var feedsByHour = getFeedsByHour();
      activityGrid.innerHTML = "";

      for (var hour = 0; hour < 24; hour += 1) {
        var cell = document.createElement("div");
        var feedDate = feedsByHour[hour];
        var level = getActivityLevel(feedDate);
        cell.className = "hour-cell" + (level ? " level-" + level : "");
        cell.title = feedDate ? "Fed at " + formatTime(feedDate) : "No feed logged at " + hour + ":00";
        activityGrid.appendChild(cell);
      }
    }

    function renderFeedLog() {
      var feeds = getFeeds().slice(0, 3);
      feedLog.innerHTML = "";

      if (feeds.length === 0) {
        var emptyItem = document.createElement("li");
        emptyItem.textContent = "No feeds yet";
        feedLog.appendChild(emptyItem);
        return;
      }

      feeds.forEach(function (entry) {
        var date = new Date(entry);
        var item = document.createElement("li");
        var label = document.createElement("strong");
        var value = document.createElement("span");

        label.textContent = formatTime(date);
        value.textContent = formatDateTime(date);
        item.appendChild(label);
        item.appendChild(value);
        feedLog.appendChild(item);
      });
    }

    function render() {
      renderCountdown();
      renderActivityGrid();
      renderFeedLog();
    }

    function showNotice(message) {
      noticeText.textContent = message;
      clearTimeout(noticeTimer);
      noticeTimer = setTimeout(function () {
        noticeText.textContent = "";
      }, 2500);
    }

    function showConfirm() {
      if (fedButton.disabled || isSaving) return;
      confirmPrompt.hidden = false;
      fedButton.disabled = true;
      confirmYes.focus();
    }

    function hideConfirm() {
      confirmPrompt.hidden = true;
      fedButton.disabled = false;
      fedButton.textContent = "Fed Baby";
    }

    function finishButtonCooldown(startedAt) {
      var elapsed = Date.now() - startedAt;
      var remaining = Math.max(0, 3000 - elapsed);

      setTimeout(function () {
        isSaving = false;
        fedButton.disabled = false;
        fedButton.textContent = "Fed Baby";
      }, remaining);
    }

    function logFeed() {
      if (isSaving) return;

      isSaving = true;
      var startedAt = Date.now();
      var nowIso = new Date().toISOString();
      var feeds = getFeeds();

      confirmPrompt.hidden = true;
      fedButton.disabled = true;
      fedButton.textContent = "Saved";
      saveFeeds([nowIso].concat(feeds));
      showNotice("Just fed");
      render();
      finishButtonCooldown(startedAt);
    }

    fedButton.addEventListener("click", showConfirm);
    confirmYes.addEventListener("click", logFeed);
    confirmCancel.addEventListener("click", hideConfirm);
    confirmPrompt.addEventListener("click", function (event) {
      if (event.target === confirmPrompt) hideConfirm();
    });
    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && !confirmPrompt.hidden) hideConfirm();
    });

    migrateLegacyFeeds();
    render();
    setInterval(renderCountdown, 1000);
    setInterval(renderActivityGrid, 60000);
  </script>
</body>
</html>
